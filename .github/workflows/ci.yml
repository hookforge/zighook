name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  ZIG_VERSION: 0.15.2

jobs:
  zig-macos-aarch64:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Zig
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            macOS) archive="zig-aarch64-macos-${ZIG_VERSION}.tar.xz" ;;
            Linux) archive="zig-aarch64-linux-${ZIG_VERSION}.tar.xz" ;;
            *)
              echo "unsupported runner OS: $RUNNER_OS" >&2
              exit 1
              ;;
          esac
          tmpdir="$(mktemp -d)"
          url="https://ziglang.org/download/${ZIG_VERSION}/${archive}"
          curl -fsSL "$url" -o "$tmpdir/$archive"
          tar -C "$tmpdir" -xf "$tmpdir/$archive"
          echo "$tmpdir/${archive%.tar.xz}" >> "$GITHUB_PATH"
          "$tmpdir/${archive%.tar.xz}/zig" version

      - name: Zig fmt
        run: zig fmt --check $(git ls-files '*.zig')

      - name: Zig build
        run: zig build

      - name: Zig test
        run: zig build test

      - name: Cross compile Linux AArch64 core and payload
        run: |
          set -euo pipefail
          zig build-lib -dynamic -target aarch64-linux-musl -OReleaseFast \
            -femit-bin=/tmp/libzighook_linux.so \
            src/root.zig \
            -lc
          zig build-lib -dynamic -target aarch64-linux-musl -OReleaseFast \
            -femit-bin=/tmp/prepatched_hook_linux.so \
            --dep zighook \
            -Mroot=examples/prepatched_inline_hook/hook.zig \
            -Mzighook=src/root.zig \
            -lc

      - name: Cross compile macOS x86_64 core and payload
        run: |
          set -euo pipefail
          zig build-lib -dynamic -target x86_64-macos -OReleaseFast \
            -femit-bin=/tmp/libzighook_macos_x86_64.dylib \
            src/root.zig \
            -lc
          zig build-lib -dynamic -target x86_64-macos -OReleaseFast \
            -femit-bin=/tmp/inline_hook_signal_macos_x86_64.dylib \
            --dep zighook \
            -Mroot=examples/inline_hook_signal/hook.zig \
            -Mzighook=src/root.zig \
            -lc

      - name: Cross compile iOS AArch64 core and payload
        run: |
          set -euo pipefail
          IOS_SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          zig build-lib -dynamic -target aarch64-ios -OReleaseFast \
            -femit-bin=/tmp/libzighook_ios.dylib \
            src/root.zig \
            -L"$IOS_SDK/usr/lib" \
            -lc
          zig build-lib -dynamic -target aarch64-ios -OReleaseFast \
            -femit-bin=/tmp/prepatched_hook_ios.dylib \
            --dep zighook \
            -Mroot=examples/prepatched_inline_hook/hook.zig \
            -Mzighook=src/root.zig \
            -L"$IOS_SDK/usr/lib" \
            -lc

      - name: Example inline_hook_signal
        working-directory: examples/inline_hook_signal
        run: |
          set -euo pipefail
          cc -arch arm64 -O3 -DNDEBUG -Wl,-export_dynamic -o target target.c
          zig build-lib -dynamic -OReleaseFast -femit-bin=hook.dylib \
            --dep zighook \
            -Mroot=hook.zig \
            -Mzighook=../../src/root.zig \
            -lc
          output="$(DYLD_INSERT_LIBRARIES="$PWD/hook.dylib" ./target)"
          test "$output" = "result=42"

      - name: Example instrument_with_original
        working-directory: examples/instrument_with_original
        run: |
          set -euo pipefail
          cc -arch arm64 -O3 -DNDEBUG -Wl,-export_dynamic -o target target.c
          zig build-lib -dynamic -OReleaseFast -femit-bin=hook.dylib \
            --dep zighook \
            -Mroot=hook.zig \
            -Mzighook=../../src/root.zig \
            -lc
          output="$(DYLD_INSERT_LIBRARIES="$PWD/hook.dylib" ./target)"
          test "$output" = "result=42"

      - name: Example instrument_no_original
        working-directory: examples/instrument_no_original
        run: |
          set -euo pipefail
          cc -arch arm64 -O3 -DNDEBUG -Wl,-export_dynamic -o target target.c
          zig build-lib -dynamic -OReleaseFast -femit-bin=hook.dylib \
            --dep zighook \
            -Mroot=hook.zig \
            -Mzighook=../../src/root.zig \
            -lc
          output="$(DYLD_INSERT_LIBRARIES="$PWD/hook.dylib" ./target)"
          test "$output" = "result=99"

      - name: Example instrument_unhook_restore
        working-directory: examples/instrument_unhook_restore
        run: |
          set -euo pipefail
          cc -arch arm64 -O3 -DNDEBUG -Wl,-export_dynamic -o target target.c
          zig build-lib -dynamic -OReleaseFast -femit-bin=hook.dylib \
            --dep zighook \
            -Mroot=hook.zig \
            -Mzighook=../../src/root.zig \
            -lc
          output="$(DYLD_INSERT_LIBRARIES="$PWD/hook.dylib" ./target)"
          expected=$'hooked=123\nrestored=5'
          test "$output" = "$expected"

      - name: Example prepatched_inline_hook
        working-directory: examples/prepatched_inline_hook
        run: |
          set -euo pipefail
          cc -arch arm64 -O3 -DNDEBUG -Wl,-export_dynamic -o target target.c
          zig build-lib -dynamic -OReleaseFast -femit-bin=hook.dylib \
            --dep zighook \
            -Mroot=hook.zig \
            -Mzighook=../../src/root.zig \
            -lc
          output="$(DYLD_INSERT_LIBRARIES="$PWD/hook.dylib" ./target)"
          test "$output" = "result=77"

  zig-linux-aarch64:
    runs-on: ubuntu-24.04-arm

    steps:
